# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "one-page-resume"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Esteban L. Gómez <https://github.com/eligero>"]
license = "MIT"
description = "One page resume"
repository = "https://github.com/eligero/one-page-resume"
keywords = [
    "cv",
    "resume",
    "curriculum-vitae",
    "modular",
    "multilingual",
]
categories = ["cv", "languages", "layout"]
compiler = "0.14"
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

[template]
path = "template"
entrypoint = "resume.typ"
thumbnail = "thumbnail.png"

[tool.utpm]
namespace = "preview"